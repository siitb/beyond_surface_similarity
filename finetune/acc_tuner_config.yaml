compute_environment: LOCAL_MACHINE
debug: false
distributed_type: MULTI_GPU
downcast_bf16: 'no'
gpu_ids: all          # set to specific IDs e.g. "0,1,2,3" if needed
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 5      # set to the number of GPUs you are using
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
